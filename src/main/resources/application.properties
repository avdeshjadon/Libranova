spring.datasource.url=jdbc:mysql://localhost:3306/ebook?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate ddl-auto (update the schema automatically without deleting data)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Port (Spring Boot defaults to 8080, changed to 8081 to avoid conflict with Tomcat)
server.port=8081
